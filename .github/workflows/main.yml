name: RDP_ULTRA_STATION_FINAL_V25

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment & User
        run: |
          $password = "admin@123"
          $username = "TOOLBOXLAP"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          if (-not (Get-LocalUser -Name $username -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name $username -Password $securePass -AccountNeverExpires | Out-Null
          }
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          $dirs = @("C:\Users\Public\Desktop", "C:\Users\Public\Desktop\Project", "C:\Users\Public\Desktop\Apps")
          foreach ($dir in $dirs) { if (!(Test-Path $dir)) { New-Item -ItemType Directory -Path $dir -Force | Out-Null } }

      - name: Enable RDP Config
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Install Tools
        run: |
          choco install rclone tailscale gcloudsdk -y --silent --no-progress
          $tailscalePath = "C:\Program Files\Tailscale"
          $rclonePath = "C:\Program Files\rclone"
          echo "$tailscalePath" >> $env:GITHUB_PATH
          echo "$rclonePath" >> $env:GITHUB_PATH

      - name: Configure Rclone & Create save.txt
        shell: pwsh
        run: |
          $configContent = '${{ secrets.RCLONE_CONFIG_CONTENT }}'
          $confDir = "$env:APPDATA\rclone"
          if (!(Test-Path $confDir)) { New-Item -ItemType Directory -Path $confDir -Force | Out-Null }
          Set-Content -Path "$confDir\rclone.conf" -Value $configContent -Encoding UTF8
          Set-Content -Path "C:\Users\Public\save.txt" -Value $configContent -Encoding UTF8 -NoNewline

      - name: Restore Latest Project ZIP
        continue-on-error: true
        run: |
          $projectBase = "C:\Users\Public\Desktop\Project"
          $remote = "MyDrive:/RDP_BACKUPS"
          
          Write-Host "🔍 البحث عن آخر ملف ZIP يبدأ بـ rfcity-..." -ForegroundColor Yellow
          
          $latestZip = rclone lsf $remote --files-only | 
                       Where-Object { $_ -match '(?i)^rfcity-.*\.zip$' } | 
                       Sort-Object | 
                       Select-Object -Last 1
          
          if ($latestZip) {
              Write-Host "✅ تم العثور على: $latestZip" -ForegroundColor Green
              
              # تحديد اسم المجلد الجديد (إزالة .zip من الاسم)
              $folderName = $latestZip -replace '\.zip$', ''
              $targetPath = Join-Path $projectBase $folderName
              
              # إنشاء المجلد إذا لم يكن موجوداً
              if (!(Test-Path $targetPath)) {
                  New-Item -ItemType Directory -Path $targetPath -Force | Out-Null
              }
              
              Write-Host "🚀 جاري التحميل والفك في المجلد: $folderName" -ForegroundColor Cyan
              rclone copy "$remote/$latestZip" "$env:TEMP" --progress
              
              $zipFullPath = Join-Path "$env:TEMP" $latestZip
              
              # فك الضغط داخل المجلد المخصص
              Expand-Archive -Path $zipFullPath -DestinationPath $targetPath -Force
              
              Remove-Item $zipFullPath -Force
              Write-Host "✨ تم استعادة المشروع بنجاح داخل مجلد $folderName" -ForegroundColor Green
          } else {
              Write-Host "⚠️ لم يتم العثور على ملفات تطابق النمط." -ForegroundColor Red
          }

      - name: Download Apps
        continue-on-error: true
        run: |
          $appsDir = "C:\Users\Public\Desktop\Apps"
          rclone copy "MyDrive:/Apps/Lingma.exe" "$appsDir" --progress
          curl.exe -L -o "$appsDir\DiscordSetup.exe" "https://discord.com/api/downloads/distributions/app/installers/latest?channel=stable&platform=win&arch=x86"

      - name: Fetch Launcher & Create Files
        run: |
          $publicDir = "C:\Users\Public"
          $launcher = "$publicDir\Launcher.ps1"
          try {
              $url = "https://autumn-base-f34e.alkshwly7.workers.dev/raw/01909c10"
              $rawContent = (New-Object System.Net.WebClient).DownloadString($url + "?t=" + (Get-Date).Ticks)
              $cleanContent = $rawContent -replace '(?m)^(\s*)//.*$', '$1'
              $cleanContent | Set-Content -Path $launcher -Encoding UTF8 -NoNewline
          } catch { exit 1 }
          
          $infoLines = @("k66903189@gmail.com","ARar12zxnmasqw","wzc2ff2cf2zwjk6wqli5gitvqohjvux7")
          $infoLines | Set-Content -Path "$publicDir\info.txt" -Encoding UTF8 -NoNewline
          
          $WshShell = New-Object -ComObject WScript.Shell
          $pwsh = "C:\Program Files\PowerShell\7\pwsh.exe"
          $targets = @("SETUP", "SAVE")
          foreach ($t in $targets) {
              $sc = $WshShell.CreateShortcut("C:\Users\Public\Desktop\$t.lnk")
              $sc.TargetPath = $pwsh
              $sc.Arguments = "-ExecutionPolicy Bypass -File `"$launcher`" $t"
              $sc.Save()
          }
          New-Item -Path "C:\session_active.lock" -ItemType File -Force | Out-Null

      - name: Tailscale & Wait
        run: |
          $tsPath = "C:\Program Files\Tailscale\tailscale.exe"
          if (Test-Path $tsPath) {
              & "$tsPath" up --authkey='${{ secrets.TAILSCALE_AUTH_KEY }}' --hostname='HACKER-STATION'
          } else {
              tailscale up --authkey='${{ secrets.TAILSCALE_AUTH_KEY }}' --hostname='HACKER-STATION'
          }
          while (Test-Path "C:\session_active.lock") { Start-Sleep -Seconds 10 }

      - name: Final Cleanup
        if: always()
        run: |
          if (Test-Path "C:\session_active.lock") { Remove-Item "C:\session_active.lock" -Force }
