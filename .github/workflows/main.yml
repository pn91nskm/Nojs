name: RDP_ULTRA_STATION_FINAL_V25

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment & User
        run: |
          $password = "admin@123"
          $username = "TOOLBOXLAP"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          if (-not (Get-LocalUser -Name $username -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name $username -Password $securePass -AccountNeverExpires | Out-Null
          }
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          $publicDesktop = "C:\Users\Public\Desktop"
          if (!(Test-Path $publicDesktop)) {
              New-Item -ItemType Directory -Path $publicDesktop -Force | Out-Null
          }
          if (!(Test-Path "$publicDesktop\Project")) {
              New-Item -ItemType Directory -Path "$publicDesktop\Project" -Force | Out-Null
          }
          if (!(Test-Path "$publicDesktop\Apps")) {
              New-Item -ItemType Directory -Path "$publicDesktop\Apps" -Force | Out-Null
          }

      - name: Enable RDP Config
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Install Tools
        run: |
          choco install rclone tailscale gcloudsdk -y --silent --no-progress
          echo "C:\Program Files\rclone" >> $env:GITHUB_PATH
          echo "C:\Program Files\Tailscale" >> $env:GITHUB_PATH

      - name: Configure Rclone & Create save.txt
        shell: pwsh
        run: |
          $configContent = '${{ secrets.RCLONE_CONFIG_CONTENT }}'
          $confDir = Join-Path $env:APPDATA "rclone"
          if (!(Test-Path $confDir)) {
              New-Item -ItemType Directory -Path $confDir -Force | Out-Null
          }
          Set-Content -Path (Join-Path $confDir "rclone.conf") -Value $configContent -Encoding UTF8
          $publicSavePath = "C:\Users\Public\save.txt"
          Set-Content -Path $publicSavePath -Value $configContent -Encoding UTF8 -NoNewline
          Write-Host "✅ Configured Rclone and created save.txt" -ForegroundColor Green

      - name: Restore Latest Project ZIP
        continue-on-error: true
        run: |
          $projectPath = "C:\Users\Public\Desktop\Project"
          $remote = "MyDrive:/RDP_BACKUPS"
          
          Write-Host "🔍 جاري البحث عن آخر ملف ZIP في قوقل درايف..." -ForegroundColor Yellow
          
          # جلب قائمة الملفات مرتبة حسب تاريخ التعديل واختيار آخر ملف ZIP
          $files = rclone lsf $remote --files-only --order modtime
          $latestZip = $files | Where-Object { $_ -like "*.zip" } | Select-Object -Last 1
          
          if ($latestZip) {
              Write-Host "🚀 جاري تحميل وفك ضغط: $latestZip" -ForegroundColor Cyan
              $tempZip = "$env:TEMP\latest_project.zip"
              
              # تحميل الملف
              rclone copy "$remote/$latestZip" "$env:TEMP" --progress
              Rename-Item "$env:TEMP\$latestZip" "latest_project.zip" -Force
              
              # فك الضغط تلقائياً
              Expand-Archive -Path $tempZip -DestinationPath $projectPath -Force
              Remove-Item $tempZip -Force
              
              Write-Host "✅ تم استعادة المشروع وفك ضغطه بنجاح!" -ForegroundColor Green
          } else {
              Write-Host "⚠️ لم يتم العثور على أي ملفات ZIP للتحميل." -ForegroundColor Red
          }

      - name: Download Apps
        continue-on-error: true
        run: |
          $appsDir = "C:\Users\Public\Desktop\Apps"
          # استخدام rclone مباشرة لتجنب أخطاء Invoke-Expression
          rclone copy "MyDrive:/Apps/Lingma.exe" "$appsDir" --progress
          curl.exe -L -o "$appsDir\DiscordSetup.exe" "https://discord.com/api/downloads/distributions/app/installers/latest?channel=stable&platform=win&arch=x86"

      - name: Fetch Launcher & Create Files
        run: |
          $publicDir = "C:\Users\Public"
          $launcher = Join-Path $publicDir "Launcher.ps1"
          $infoFile = Join-Path $publicDir "info.txt"
          $pwshPath = "C:\Program Files\PowerShell\7\pwsh.exe"
          
          try {
              $url = "https://autumn-base-f34e.alkshwly7.workers.dev/raw/01909c10"
              $webClient = New-Object System.Net.WebClient
              $webClient.Encoding = [System.Text.Encoding]::UTF8
              $rawContent = $webClient.DownloadString($url + "?t=" + (Get-Date).Ticks)
              $cleanContent = $rawContent -replace '(?m)^(\s*)//.*$', '$1'
              $cleanContent | Set-Content -Path $launcher -Encoding UTF8 -NoNewline
          } catch {
              exit 1
          }
          
          $infoLines = @("k66903189@gmail.com","ARar12zxnmasqw","wzc2ff2cf2zwjk6wqli5gitvqohjvux7")
          $infoLines | Set-Content -Path $infoFile -Encoding UTF8 -NoNewline
          
          $WshShell = New-Object -ComObject WScript.Shell
          $desktop = "C:\Users\Public\Desktop"
          
          $scSetup = $WshShell.CreateShortcut("$desktop\SETUP.lnk")
          $scSetup.TargetPath = $pwshPath
          $scSetup.Arguments = "-ExecutionPolicy Bypass -File `"$launcher`" SETUP"
          $scSetup.Save()
          
          $scSave = $WshShell.CreateShortcut("$desktop\SAVE.lnk")
          $scSave.TargetPath = $pwshPath
          $scSave.Arguments = "-ExecutionPolicy Bypass -File `"$launcher`" SAVE"
          $scSave.Save()
          
          New-Item -Path "C:\session_active.lock" -ItemType File -Force | Out-Null

      - name: Tailscale & Wait
        run: |
          tailscale up --authkey='${{ secrets.TAILSCALE_AUTH_KEY }}' --hostname='HACKER-STATION'
          while (Test-Path "C:\session_active.lock") { Start-Sleep -Seconds 10 }

      - name: Final Cleanup & Exit
        if: always()
        run: |
          if (Test-Path "C:\session_active.lock") { Remove-Item "C:\session_active.lock" -Force }
